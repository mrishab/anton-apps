services:
  hermes-agent:
    image: nousresearch/hermes-agent:v2026.7.7.2
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "${HERMES_PORT}:8642"
      - "${HERMES_DASHBOARD_PORT}:9119"
    volumes:
      - "${HERMES_HOST_DATA_DIR}:/opt/data"
    environment:
      HERMES_DASHBOARD: 1
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
    depends_on:
      - redis-cache

  redis-cache:
    image: redis:7-alpine
    container_name: hermes-redis-cache
    restart: unless-stopped
    ports:
      - "6379"
