services:
    cadvisor:
        image: gcr.io/cadvisor/cadvisor:v0.52.0
        container_name: cadvisor
        restart: unless-stopped
        ports:
            - ${CADVISOR_UI_PORT}:8080
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:rw
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro
        devices:
            - /dev/kmsg:/dev/kmsg
