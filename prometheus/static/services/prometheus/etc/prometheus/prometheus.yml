global:
  evaluation_interval: 1m
  scrape_interval: 1m
  scrape_timeout: 1m

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['host.docker.internal:9090']

  - job_name: node_anton
    static_configs:
      - targets: ['192.168.1.67:9100']

  - job_name: cadvisor_anton
    static_configs: 
      - targets: 
          - "192.168.1.67:8383"

  - job_name: node_orion
    static_configs: 
      - targets: 
          - "host.docker.internal:9100"

  - job_name: cadvisor_orion
    static_configs: 
      - targets: 
          - "host.docker.internal:8383"

  - job_name: nginx_exporter
    static_configs:
      - targets: ['192.168.1.67:9113']

rule_files:
  - "rules/node_rules.yml"
  - "rules/app_rules.yml"
  - "rules/nginx_rules.yml"
