global:
  resolve_timeout: 1m
  slack_api_url_file: "/etc/alertmanager/slack_webhook.txt"

route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 1m
  repeat_interval: 3h
  receiver: "slack-notifications"

receivers:
  - name: "slack-notifications"
    slack_configs:
      - send_resolved: true
        title: "{{ .Status }}: {{ .CommonLabels.alertname }}"
        text: |
          *Alert:* {{ .CommonLabels.alertname }}
          *Status:* {{ .Status }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .CommonLabels.severity }}
          *Instance:* {{ .CommonLabels.instance }}
          *Labels:*
          {{ range .CommonLabels.SortedPairs }}
          • {{ .Name }}: {{ .Value }}
          {{ end }}
        channel: "server-health"
        icon_url: "https://prometheus.io/assets/prometheus_logo_grey.svg"
        username: "Prometheus Alertmanager"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "dev", "instance"]
