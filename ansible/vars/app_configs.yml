all_apps:
  - affine
  - bentopdf
  - codeserver
  - deluge
  - dockovpn
  - duplicati
  - epg
  - freshrss
  - ghost
  - immich
  - jellyfin
  - jenkins
  - jupyter
  - lazylibrarian
