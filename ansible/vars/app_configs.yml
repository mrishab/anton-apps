      - { path: "{{ host_data_dir }}/affine/db", mode: "0700" }
      - { path: "{{ host_data_dir }}/affine/app/uploads" }
      - { path: "{{ host_data_dir }}/affine/app/config" }
  bentopdf:
    port: 8085
    dirs:
      - { path: "{{ host_data_dir }}/bentopdf/config", owner: "1000", group: "1000" }
      - { path: "{{ host_data_dir }}/bentopdf/data", owner: "1000", group: "1000" }
