---
- name: Deploy Apps
  hosts: all
  become: true
  vars_files:
    - vars/app_configs.yml

  vars:
    # Use 'apps' extra var if provided (split string into list), otherwise use default_apps from group_vars
    target_apps: "{{ apps.split(',') if apps is defined else enabled_apps }}"

  tasks:
    - name: Install dependencies
      apt:
        name:
          - acl
          - rsync
          - ufw
          - bat
        state: present
        update_cache: yes

    - name: Create symlink for batcat to bat
      file:
        src: /usr/bin/batcat
        dest: /usr/bin/bat
        state: link
        force: yes
      ignore_errors: true # In case it's already named bat or not installed as batcat

    - name: Allow app ports in UFW
      community.general.ufw:
        rule: allow
        port: "{{ port_item | string }}"
      loop:
        "{{ target_apps | select('in', app_configs) | map('extract', app_configs)
        | map(attribute='port', default=[]) | flatten }}"
      loop_control:
        loop_var: port_item
      when: port_item is defined

    - name: Set sysctl for SonarQube
      sysctl:
        name: vm.max_map_count
        value: "262144"
        state: present
        reload: yes
      when: "'sonarqube' in target_apps"

    - name: Set sysctl UDP buffer sizes for QUIC (cloudflared)
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: "net.core.rmem_max", value: "7500000" }
        - { key: "net.core.wmem_max", value: "7500000" }
      when: "'cloudflared' in target_apps"

    - name: Set ACL for duplicati group on external hdd
      ansible.posix.acl:
        path: /mnt/external_hdd
        entity: "{{ primary_owner }}"
        etype: group
        permissions: rx
        recursive: yes
        state: present
      tags:
        - setup_acl

    - name: Create base host app directory
      file:
        path: "{{ host_app_dir }}"
        state: directory
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0755"
      check_mode: no

    - name: Setup host data directories and permissions
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default(omit) }}"
        group: "{{ item.group | default(omit) }}"
        mode: "{{ item.mode | default('0755') }}"
      loop:
        "{{ target_apps | select('in', app_configs) | map('extract', app_configs)
        | map(attribute='dirs', default=[]) | flatten }}"
      check_mode: no

    - name: Ensure app directory exists
      file:
        path: "{{ host_app_dir }}/{{ item }}"
        state: directory
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0755"
      loop: "{{ target_apps }}"
      become: false
      check_mode: no

    - name: Synchronize app files to host
      synchronize:
        src: "../{{ item }}/"
        dest: "{{ host_app_dir }}/{{ item }}/"
        recursive: yes
        delete: yes # Match contents exactly
        rsync_path: "{{ rsync_path | default(omit) }}"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=*.log"
          - "--exclude=template.env"
          - "--exclude=README.md"
          - "--exclude=.env"
          - "--exclude=*.tf*"
          - "--no-perms"
          - "--no-owner"
          - "--no-group"
      loop: "{{ target_apps }}"
      become: false
      check_mode: no
      register: sync_results
      notify: Restart app

    - name: Sync app .env files to host
      synchronize:
        src: "../{{ item }}/.env"
        dest: "{{ host_app_dir }}/{{ item }}/.env"
        recursive: no
        rsync_path: "{{ rsync_path | default(omit) }}"
        rsync_opts:
          - "--ignore-missing-args"
      loop: "{{ target_apps }}"
      when: item not in (blocked_env_sync_apps | default([]))
      become: false
      check_mode: no
      register: env_sync_results
      notify: Restart app on env change
      tags:
        - sync_env

    - name: Deploy Makefile
      template:
        src: templates/Makefile.j2
        dest: "{{ host_app_dir }}/Makefile"
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0644"

    - name: Ensure scripts directory exists
      file:
        path: "/home/{{ host_user }}/scripts"
        state: directory
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0755"

    - name: Deploy maintenance script
      template:
        src: templates/maintenance.sh.j2
        dest: "/home/{{ host_user }}/scripts/maintenance.sh"
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0755"

    - name: Source maintenance script in .bashrc
      lineinfile:
        path: "/home/{{ host_user }}/.bashrc"
        line: "source ~/scripts/maintenance.sh"
        insertafter: EOF
        create: yes
        state: present

  handlers:
    - name: Restart app
      command: "make reset APPS={{ item.item }}"
      args:
        chdir: "{{ host_app_dir }}"
      loop: "{{ sync_results.results }}"
      when: item.changed
      become: false

    - name: Restart app on env change
      command: "make reset APPS={{ item.item }}"
      args:
        chdir: "{{ host_app_dir }}"
      loop: "{{ env_sync_results.results }}"
      when: item.changed and env_sync_results is defined and env_sync_results.results is defined
      become: false
