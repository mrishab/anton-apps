---
- name: Deploy Apps
  hosts: all
  become: true
  vars_files:
    - vars/app_configs.yml

  vars:
    # Use 'apps' extra var if provided (split string into list), otherwise use default_apps from group_vars
    target_apps: "{{ apps.split(',') if apps is defined else enabled_apps }}"

  tasks:
    - name: Install dependencies
      apt:
        name:
          - acl
          - rsync
          - ufw
          - bat
        state: present
        update_cache: yes

    - name: Create symlink for batcat to bat
      file:
        src: /usr/bin/batcat
        dest: /usr/bin/bat
        state: link
        force: yes
      ignore_errors: yes # In case it's already named bat or not installed as batcat

    - name: Allow app ports in UFW
      community.general.ufw:
        rule: allow
        port: "{{ port_item | string }}"
        proto: tcp
      loop: "{{ target_apps | select('in', app_configs) | map('extract', app_configs)
        | map(attribute='port', default=[]) | flatten }}"
      loop_control:
        loop_var: port_item
      when: port_item is defined

    - name: Set sysctl for SonarQube
      sysctl:
        name: vm.max_map_count
        value: "262144"
        state: present
        reload: yes
      when: "'sonarqube' in target_apps"

    # - name: Set ACL for duplicati group on external hdd
    #   ansible.posix.acl:
    #     path: /mnt/external_hdd
    #     entity: 1000
    #     etype: group
    #     permissions: rx
    #     recursive: yes
    #     state: present

    - name: Create base host app directory
      file:
        path: "{{ host_app_dir }}"
        state: directory
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0755"
      check_mode: no

    - name: Setup host data directories and permissions
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default(omit) }}"
        group: "{{ item.group | default(omit) }}"
        mode: "{{ item.mode | default('0755') }}"
      loop: "{{ target_apps | select('in', app_configs) | map('extract', app_configs)
        | map(attribute='dirs', default=[]) | flatten }}"
      check_mode: no

    - name: Synchronize app files to host
      synchronize:
        src: "../{{ item }}/"
        dest: "{{ host_app_dir }}/{{ item }}/"
        recursive: yes
        delete: yes # Match contents exactly
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=*.log"
          - "--exclude=template.env"
          - "--exclude=README.md"
      loop: "{{ target_apps }}"
      become: false
      check_mode: no

    - name: Deploy Makefile
      template:
        src: templates/Makefile.j2
        dest: "{{ host_app_dir }}/Makefile"
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0644"

    - name: Manage enabled apps using Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ host_app_dir }}/{{ item }}"
        state: "{{ app_state | default('present') }}"
      loop: "{{ target_apps }}"

    - name: Ensure scripts directory exists
      file:
        path: "/home/{{ host_user }}/scripts"
        state: directory
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0775"

    - name: Deploy maintenance script
      template:
        src: templates/maintenance.sh.j2
        dest: "/home/{{ host_user }}/scripts/.maintenance.sh"
        owner: "{{ host_user }}"
        group: "{{ host_user }}"
        mode: "0755"

    - name: Source maintenance script in .bashrc
      lineinfile:
        path: "/home/{{ host_user }}/.bashrc"
        line: "source ~/scripts/.maintenance.sh"
        insertafter: EOF
        create: yes
        state: present
